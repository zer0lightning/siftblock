name: Generate SiftBlock Blocklist

on:
  schedule:
    - cron: "0 * * * *"  # Every hour
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: write

concurrency:
  group: siftblock-write
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate blocklist
        run: python src/generate_blocklist.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocklist.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            ENTRY_COUNT=$(grep -v '^#' blocklist.txt | grep -v '^$' | wc -l | tr -d ' ')
            git commit -m "chore: update blocklist — ${ENTRY_COUNT} entries [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
